apiVersion: apps/v1
kind: Deployment 
metadata:
  name: webapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
        - name: testapp
          image: nginx
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 10
              memory: "10Gi"


# If resources requests more than node allocatable, pod will be in pending state.
# If pod should not match node criteria, like resources then the pod will be "Burstable".
