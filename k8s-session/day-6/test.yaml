apiVersion: v1
kind: Pod
metadata:
  name: stress-tool
spec:
  containers:
  - name: testapp
    image: polinux/stress
    command: ["stress", "--cpu", "1", "--vm", "1", "--vm-bytes", "2G", "--vm-hang", "1"]
    resources:
      requests:
        cpu: 100m
        memory: "500Mi"
      limits:
        cpu: 1
        memory: "1Gi"