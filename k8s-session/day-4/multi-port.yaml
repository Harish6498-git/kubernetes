# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
  labels:
    type: app
spec:
  template:
    metadata:
      name: myapp-pod
      labels:
        type: app
    spec:
      containers:
        - name: mywebapp
          image: nginx
        - name: webappserver
          image: tomcat
  replicas: 2
  selector:
    matchLabels:
      type: app

---
# Service
apiVersion: v1 
kind: Service 
metadata: 
  name: multiport-service
spec:
  type: NodePort
  selector:
    type: app
  ports:
    - name: nginx-port
      port: 80
      protocol: TCP
      targetPort: 80
    - name: tomcat-port
      port: 8080
      protocol: TCP 
      targetPort: 8080