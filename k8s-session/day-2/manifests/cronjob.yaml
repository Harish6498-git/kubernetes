apiVersion: batch/v1
kind: CronJob
metadata:
  name: goldapi-sns-cron
spec:
  schedule: "* * * * *"  # Runs every minute for testing; change to "0 9 * * *" for 9 AM daily
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: goldapi-sns
            image: harish0604/cronjob:latest
            env:
            - name: GOLDAPI_KEY
              valueFrom:
                secretKeyRef:
                  name: goldapi-secret
                  key: api_key
            - name: SNS_TOPIC_ARN
              valueFrom:
                secretKeyRef:
                  name: goldapi-secret
                  key: sns_topic_arn
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: goldapi-secret
                  key: aws_access_key_id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: goldapi-secret
                  key: aws_secret_access_key
          restartPolicy: OnFailure


