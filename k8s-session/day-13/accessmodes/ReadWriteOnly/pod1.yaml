apiVersion: v1
kind: Pod
metadata:
  name: efs-pod-rwo-1
spec:
  containers:
    - name: app-container-1
      image: nginx:latest
      volumeMounts:
        - mountPath: "/shared-data"
          name: efs-volume
  volumes:
    - name: efs-volume
      persistentVolumeClaim:
        claimName: my-pvc