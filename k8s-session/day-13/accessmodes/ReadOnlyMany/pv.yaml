apiVersion: v1
kind: PersistentVolume
metadata:
  name: efs-volume-static-rom
spec:
  capacity:
    storage: 5Gi
  volumeMode: Filesystem
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: fs-05f848916c90db473.efs.us-east-2.amazonaws.com
    path: /
    readOnly: true  
  mountOptions:
    - ro

