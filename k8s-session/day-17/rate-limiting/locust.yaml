apiVersion: v1
kind: ConfigMap
metadata:
  name: locust-script
data:
  locustfile.py: |-
    from locust import HttpUser, task, between 

    class QuickstartUser(HttpUser): 
        wait_time = between(0.7, 1.3) 

        @task(1) 
        def visit_website(self): 
            with self.client.get("/", headers={"Host": "doctor.harishpro.com", "User-Agent": "Mozilla"}, timeout=0.2, catch_response=True) as response: 
                if response.request_meta["response_time"] > 200: 
                    response.failure("Frontend failed") 
                else: 
                    response.success() 
    
        @task(5) 
        def visit_api(self): 
            with self.client.get("/", headers={"Host": "gym.harishpro.com"}, timeout=0.2) as response: 
                if response.request_meta["response_time"] > 200: 
                    response.failure("API failed") 
                else: 
                    response.success() 

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust
spec:
  selector:
    matchLabels:
      app: locust
  template:
    metadata:
      labels:
        app: locust
    spec:
      containers:
        - name: locust
          image: locustio/locust
          ports:
            - containerPort: 8089
          args:
            - -f
            - /home/locust/locustfile.py
            - --web-host
            - 0.0.0.0
            - --web-port
            - "8089"
            - --host
            - http://ingress-nginx-controller.ingress-nginx.svc.cluster.local
          volumeMounts:
            - name: locust-script
              mountPath: /home/locust
      volumes:
        - name: locust-script
          configMap:
            name: locust-script


---

apiVersion: v1
kind: Service
metadata:
  name: locust
spec:
  ports:
    - port: 8089
      targetPort: 8089
  selector:
    app: locust